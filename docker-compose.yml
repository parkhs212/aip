services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8002
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://aip_user:aip_pass@db:5432/aip_db
      SECRET_KEY: dev-secret-key-change-in-prod
      CORS_ORIGINS: http://localhost:3001,http://localhost:8002
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aip_user
      POSTGRES_PASSWORD: aip_pass
      POSTGRES_DB: aip_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5600:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aip_user -d aip_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "3001:80"
    volumes:
      - ./nginx/nginx-dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  frontend_node_modules:
  db_data:
